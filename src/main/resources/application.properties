spring.application.name=orn

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Frontend and backend now live on different domains (e.g. Netlify + Render),
# so the session cookie must be SameSite=None and Secure for the browser to
# send it along with cross-origin fetch() calls that use credentials:'include'.
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true